name: checkout-url CI

on:
  pull_request:
    paths:
      - 'services/checkout-url/**'
      - '.github/workflows/checkout-url-ci.yml'
  push:
    branches: [main]
    paths:
      - 'services/checkout-url/**'
      - '.github/workflows/checkout-url-ci.yml'

defaults:
  run:
    working-directory: services/checkout-url

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: services/checkout-url/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          # Pin explicit version: golangci-lint v2.x requires action @v7+
          # (action @v6 only supports v1 line, which is stuck on Go 1.24 builder
          # and refuses to lint when go.mod targets Go 1.25+ from Fiber v3 deps).
          version: v2.12.2
          working-directory: services/checkout-url

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: services/checkout-url/go.sum
      - run: go test -race -coverprofile=coverage.out -coverpkg=./internal/... ./...
      - run: go tool cover -func=coverage.out
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: services/checkout-url/coverage.out

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/checkout-url
          push: false
          tags: checkout-url:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
